<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1240" viewBox="0 0 1200 1240" role="img" aria-labelledby="title desc">
  <title id="title">From training set to closed-form teacher distribution</title>
  <desc id="desc">A flowchart showing how the training sample, rule set, student distribution, rule energy, unnormalized weights, and normalization constant combine to produce the closed-form teacher distribution.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 16; ry: 16; }
      .panel { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 18; ry: 18; }
      .accent-left { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 16; ry: 16; }
      .accent-right { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; rx: 16; ry: 16; }
      .accent-mid { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 16; ry: 16; }
      .accent-bottom { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; rx: 18; ry: 18; }
      .label { font-family: "Segoe UI", sans-serif; font-size: 26px; font-weight: 600; fill: #0f172a; }
      .body { font-family: "Segoe UI", sans-serif; font-size: 22px; fill: #1e293b; }
      .small { font-family: "Segoe UI", sans-serif; font-size: 20px; fill: #334155; }
      .math { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 30px; fill: #0f172a; }
      .math-small { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 26px; fill: #0f172a; }
      .muted { fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-dash { stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowhead); }
      .divider { stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1240" />

  <text x="70" y="52" class="label">From the Training Set to the Closed-Form Teacher Distribution</text>

  <rect x="60" y="90" width="430" height="110" class="accent-left" />
  <text x="88" y="132" class="label">Training Set</text>
  <text x="88" y="172" class="math">
    D = {(x<tspan baseline-shift="sub" font-size="18">n</tspan>, y<tspan baseline-shift="sub" font-size="18">n</tspan>)}<tspan baseline-shift="sub" font-size="18">n=1</tspan><tspan baseline-shift="super" font-size="18">N</tspan>
  </text>

  <rect x="710" y="90" width="430" height="110" class="accent-right" />
  <text x="738" y="132" class="label">Rule Set and Hyperparameters</text>
  <text x="738" y="172" class="math">
    R = {(R<tspan baseline-shift="sub" font-size="18">l</tspan>, λ<tspan baseline-shift="sub" font-size="18">l</tspan>)}<tspan baseline-shift="sub" font-size="18">l=1</tspan><tspan baseline-shift="super" font-size="18">L</tspan>, C &gt; 0
  </text>

  <rect x="180" y="250" width="520" height="116" class="box" />
  <text x="210" y="292" class="label">Fix the Current Training Sample</text>
  <text x="210" y="328" class="math-small">
    (x<tspan baseline-shift="sub" font-size="16">n</tspan>, y<tspan baseline-shift="sub" font-size="16">n</tspan>) ∈ D
  </text>
  <text x="210" y="356" class="math-small">
    x := x<tspan baseline-shift="sub" font-size="16">n</tspan>, y ∈ Y
  </text>

  <rect x="180" y="420" width="520" height="116" class="accent-mid" />
  <text x="210" y="462" class="label">Student Network Forward Pass</text>
  <text x="210" y="503" class="math-small">
    z<tspan baseline-shift="sub" font-size="16">θ</tspan>(x) → p<tspan baseline-shift="sub" font-size="16">θ</tspan>(y | x)
  </text>

  <rect x="120" y="600" width="960" height="210" class="panel" />
  <text x="150" y="642" class="label">For each concrete output state y ∈ Y, compute the rule term</text>
  <line x1="150" y1="665" x2="1050" y2="665" class="divider" />

  <text x="160" y="708" class="body">1. grounding</text>
  <text x="350" y="708" class="math-small">
    R<tspan baseline-shift="sub" font-size="16">l</tspan> → R<tspan baseline-shift="sub" font-size="16">lg</tspan>(x, y)
  </text>

  <text x="160" y="748" class="body">2. soft truth value</text>
  <text x="350" y="748" class="math-small">
    r<tspan baseline-shift="sub" font-size="16">lg</tspan>(x, y)
  </text>

  <text x="160" y="788" class="body">3. rule energy</text>
  <text x="350" y="788" class="math-small">
    E<tspan baseline-shift="sub" font-size="16">R</tspan>(x, y) = C ∑<tspan baseline-shift="sub" font-size="16">l,g</tspan> λ<tspan baseline-shift="sub" font-size="16">l</tspan> (1 - r<tspan baseline-shift="sub" font-size="16">lg</tspan>(x, y))
  </text>

  <text x="160" y="838" class="small muted">This is where “student prediction” and “rule constraint” are actually coupled.</text>

  <rect x="220" y="870" width="760" height="92" class="box" />
  <text x="250" y="912" class="label">Unnormalized Weight</text>
  <text x="250" y="946" class="math-small">
    w(y) = p<tspan baseline-shift="sub" font-size="16">θ</tspan>(y | x) exp(-E<tspan baseline-shift="sub" font-size="16">R</tspan>(x, y))
  </text>

  <rect x="310" y="995" width="580" height="72" class="box" />
  <text x="338" y="1037" class="math-small">
    Z(x) = ∑<tspan baseline-shift="sub" font-size="16">y' ∈ Y</tspan> w(y')
  </text>

  <rect x="100" y="1088" width="1000" height="142" class="accent-bottom" />
  <text x="130" y="1130" class="label">Closed-Form Teacher Distribution</text>
  <text x="130" y="1170" class="math-small">
    q<tspan baseline-shift="super" font-size="16">*</tspan>(y | x) = w(y) / Z(x)
  </text>
  <text x="130" y="1210" class="math-small">
    = p<tspan baseline-shift="sub" font-size="16">θ</tspan>(y | x) exp(-E<tspan baseline-shift="sub" font-size="16">R</tspan>(x, y))
    / ∑<tspan baseline-shift="sub" font-size="16">y' ∈ Y</tspan> p<tspan baseline-shift="sub" font-size="16">θ</tspan>(y' | x) exp(-E<tspan baseline-shift="sub" font-size="16">R</tspan>(x, y'))
  </text>

  <path d="M275 200 L275 250" class="arrow" />
  <path d="M440 366 L440 420" class="arrow" />
  <path d="M925 200 L925 600" class="arrow-dash" />
  <path d="M700 478 L820 478 L820 600" class="arrow-dash" />
  <path d="M600 810 L600 870" class="arrow" />
  <path d="M600 962 L600 995" class="arrow" />
  <path d="M600 1067 L600 1088" class="arrow" />

  <text x="742" y="534" class="small muted">The rule branch merges here</text>
</svg>
