<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="980" viewBox="0 0 1360 980" role="img" aria-labelledby="title desc">
  <title id="title">Hu 2016 three-step injection mechanism</title>
  <desc id="desc">A diagram showing how Hu 2016 keeps a generic network, injects rule bias at the predictive-distribution level, and writes that bias back through distillation.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2.2; rx: 18; ry: 18; }
      .green { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2.2; rx: 18; ry: 18; }
      .purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2.2; rx: 18; ry: 18; }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 14; ry: 14; }
      .badge { fill: #0f172a; }
      .title { font-family: "Segoe UI", sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: "Segoe UI", sans-serif; font-size: 22px; fill: #334155; }
      .head { font-family: "Segoe UI", sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .body { font-family: "Segoe UI", sans-serif; font-size: 21px; fill: #1e293b; }
      .small { font-family: "Segoe UI", sans-serif; font-size: 19px; fill: #475569; }
      .math { font-family: "Times New Roman", serif; font-size: 26px; fill: #0f172a; }
      .maths { font-family: "Times New Roman", serif; font-size: 22px; fill: #0f172a; }
      .arrow { stroke: #475569; stroke-width: 3.2; fill: none; marker-end: url(#arrowhead); }
      .loop { stroke: #8b5cf6; stroke-width: 2.8; fill: none; marker-end: url(#arrowheadPurple); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569" />
    </marker>
    <marker id="arrowheadPurple" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#8b5cf6" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1360" height="980" />

  <text x="60" y="56" class="title">Hu 2016: How Rules Enter Learning Without Rewriting the Network</text>
  <text x="60" y="92" class="subtitle">The key is not to insert rules directly into network layers, but to first reshape the current posterior and then distill that bias back into the parameters.</text>

  <circle cx="95" cy="182" r="28" class="badge" />
  <text x="86" y="191" class="body" fill="#ffffff">1</text>
  <rect x="150" y="132" width="1060" height="210" class="blue" />
  <text x="182" y="182" class="head">Keep the generic parameterized student network</text>
  <text x="182" y="226" class="body">Start from a standard student model. The rule does not decide the topology, depth, or connectivity pattern.</text>
  <text x="182" y="275" class="math">p<tspan baseline-shift="sub" font-size="16">theta,t</tspan>(y | x)</text>
  <text x="304" y="275" class="body">is produced by the current parameters; the task loss remains</text>
  <text x="182" y="316" class="maths">L<tspan baseline-shift="sub" font-size="14">task</tspan>(theta) = (1/N) sum<tspan baseline-shift="sub" font-size="14">n</tspan> l(y<tspan baseline-shift="sub" font-size="14">n</tspan>, p<tspan baseline-shift="sub" font-size="14">theta</tspan>(.|x<tspan baseline-shift="sub" font-size="14">n</tspan>)).</text>
  <rect x="850" y="208" width="320" height="94" class="note" />
  <text x="874" y="243" class="small">This guarantees that expressive power comes from the generic</text>
  <text x="874" y="273" class="small">parameterized model, not from a rule-specific architecture.</text>

  <circle cx="95" cy="452" r="28" class="badge" />
  <text x="86" y="461" class="body" fill="#ffffff">2</text>
  <rect x="150" y="392" width="1060" height="250" class="green" />
  <text x="182" y="442" class="head">Inject rule bias at the predictive-distribution level</text>
  <text x="182" y="486" class="body">Instead of directly changing the parameters, find a rule-aware teacher distribution near the current student distribution.</text>
  <text x="182" y="532" class="maths">q<tspan baseline-shift="super" font-size="14">*</tspan><tspan baseline-shift="sub" font-size="14">t</tspan>(.|x) = argmin<tspan baseline-shift="sub" font-size="14">q</tspan> [ KL(q || p<tspan baseline-shift="sub" font-size="14">theta,t</tspan>) + C sum<tspan baseline-shift="sub" font-size="14">l,g</tspan> lambda<tspan baseline-shift="sub" font-size="14">l</tspan> (1 - E<tspan baseline-shift="sub" font-size="14">q</tspan>[r<tspan baseline-shift="sub" font-size="14">lg</tspan>]) ]</text>
  <text x="182" y="575" class="body">Closed-form view:</text>
  <text x="182" y="608" class="maths">q<tspan baseline-shift="super" font-size="14">*</tspan><tspan baseline-shift="sub" font-size="14">t</tspan>(y|x) = Renorm[p<tspan baseline-shift="sub" font-size="14">theta,t</tspan>(y|x) exp(-E<tspan baseline-shift="sub" font-size="14">R</tspan>(x,y))].</text>
  <rect x="826" y="482" width="344" height="118" class="note" />
  <text x="850" y="519" class="small">The rule acts on the posterior here:</text>
  <text x="850" y="549" class="small">states that violate the rule are downweighted,</text>
  <text x="850" y="579" class="small">and more rule-consistent states gain probability mass.</text>

  <circle cx="95" cy="748" r="28" class="badge" />
  <text x="86" y="757" class="body" fill="#ffffff">3</text>
  <rect x="150" y="688" width="1060" height="214" class="purple" />
  <text x="182" y="738" class="head">Write that rule bias back through distillation</text>
  <text x="182" y="782" class="body">Use the online-generated teacher distribution as a soft target, and let the next-round student imitate it.</text>
  <text x="182" y="832" class="maths">theta<tspan baseline-shift="sub" font-size="14">t+1</tspan> = argmin<tspan baseline-shift="sub" font-size="14">theta</tspan> (1/N) sum<tspan baseline-shift="sub" font-size="14">n</tspan> [ (1-pi<tspan baseline-shift="sub" font-size="14">t</tspan>) l(y<tspan baseline-shift="sub" font-size="14">n</tspan>, p<tspan baseline-shift="sub" font-size="14">theta</tspan>) + pi<tspan baseline-shift="sub" font-size="14">t</tspan> KL(q<tspan baseline-shift="super" font-size="14">*</tspan><tspan baseline-shift="sub" font-size="14">t</tspan> || p<tspan baseline-shift="sub" font-size="14">theta</tspan>) ]</text>
  <rect x="816" y="760" width="354" height="106" class="note" />
  <text x="840" y="797" class="small">Result: the rule no longer remains only as a “current</text>
  <text x="840" y="827" class="small">distribution reshaper”; it gradually gets written into theta<tspan baseline-shift="sub" font-size="13">t+1</tspan>.</text>

  <path d="M680 342 L680 392" class="arrow" />
  <path d="M680 642 L680 688" class="arrow" />
  <path d="M210 900 C 120 900, 120 210, 182 210" class="loop" />
  <text x="42" y="560" transform="rotate(-90 42 560)" class="small" fill="#8b5cf6">After the update we get a new student, then repeat 1→2→3</text>
</svg>
